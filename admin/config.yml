backend:
  name: git-gateway
  branch: main # Aapki repo ki main branch ka naam (main ya master)

# Yeh format CMS ko batayega ke JSON kaise update karna hai
collections:
  - name: "website_data"
    label: "Website Data"
    files:
      - label: "Main Data JSON"
        name: "data"
        file: "data.json" # Aapki data.json file ki location
        fields:
          # Yahan aapke JSON structure ke hisaab se fields aayengi
          - {label: "List of Items", name: "items", widget: "list", fields: [
              {label: "Title", name: "title", widget: "string"},
              {label: "Description", name: "description", widget: "text"}
            ]}
